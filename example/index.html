<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid WebGL Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            background: #fff;
            display: flex;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            color: #222;
            font-size: 13px;
        }

        /* ---- Sidebar ---- */
        #sidebar {
            width: 180px;
            flex-shrink: 0;
            background: #f5f5f5;
            border-right: 1px solid #d0d0d0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #sidebar-header {
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #d0d0d0;
            user-select: none;
        }

        #example-list {
            flex: 1;
            overflow-y: auto;
        }

        .example-item {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            border-bottom: 1px solid #e8e8e8;
            user-select: none;
        }

        .example-item:hover {
            background: #e8e8e8;
        }

        .example-item.active {
            background: #222;
            color: #fff;
        }

        /* ---- Main ---- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        /* ---- Top bar ---- */
        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: #f5f5f5;
            border-bottom: 1px solid #d0d0d0;
            font-size: 12px;
            color: #555;
            flex-shrink: 0;
        }

        #topbar #info {
            font-weight: 700;
            color: #222;
        }

        /* ---- Content Area ---- */
        #content-area {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ---- Canvas Panel ---- */
        #canvas-panel {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d0d0d0;
        }

        #canvas-panel canvas {
            display: block;
            background: #000;
        }

        /* ---- Code Panel ---- */
        #code-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        #code-panel-header {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            user-select: none;
        }

        #code-display {
            flex: 1;
            overflow: auto;
            padding: 10px 14px;
            background: #fff;
        }

        #code-display code {
            display: block;
            white-space: pre;
            word-break: normal;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #24292e;
        }

        /* ---- highlight.js overrides ---- */
        .hljs {
            background: none;
            color: #24292e;
            padding: 0;
        }

        .hljs-attr {
            color: #005cc5;
        }

        .hljs-string {
            color: #22863a;
        }

        .hljs-number {
            color: #d73a49;
        }

        .hljs-literal {
            color: #d73a49;
        }

        .hljs-keyword {
            color: #d73a49;
        }

        .hljs-function {
            color: #6f42c1;
        }

        .hljs-comment {
            color: #6a737d;
            font-style: italic;
        }

        .hljs-tag {
            color: #22863a;
        }

        .hljs-name {
            color: #22863a;
        }

        .hljs-built_in {
            color: #005cc5;
        }

        .hljs-params {
            color: #e36209;
        }

        .hljs-title {
            color: #6f42c1;
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        :root {
            --bg: #f7f8fa;
            --panel: #ffffff;
            --panel-soft: #f0f3f5;
            --border: #d9dee5;
            --text: #20252c;
            --muted: #687382;
            --accent: #16785f;
            --accent-soft: #e5f4ef;
            --code-bg: #111820;
            --code-text: #edf3f7;
            --link: #155eb8;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: var(--bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            font-size: 14px;
        }

        a {
            color: var(--link);
            text-decoration: none;
        }

        a:hover {
            text-decoration: none;
            color: var(--accent);
        }

        #sidebar {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
        }

        #sidebar-header {
            padding: 22px 22px 18px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            text-transform: none;
        }

        #sidebar-header::after {
            content: "WebGL playground";
            display: block;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }

        #example-list {
            padding: 10px 8px 24px;
        }

        .example-item {
            border: 0;
            border-radius: 6px;
            padding: 9px 12px;
            color: var(--text);
            font-size: 13px;
            line-height: 1.35;
        }

        .example-item:hover {
            background: var(--panel-soft);
        }

        .example-item.active {
            background: var(--accent-soft);
            color: #0f5947;
            font-weight: 800;
        }

        #topbar {
            min-height: 54px;
            padding: 0 28px;
            background: rgba(247, 248, 250, 0.92);
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            backdrop-filter: blur(10px);
        }

        #topbar #info {
            color: var(--text);
            font-size: 14px;
            font-weight: 900;
        }

        #top-links {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-left: auto;
            font-size: 14px;
            font-weight: 800;
        }

        #content-area {
            background: var(--bg);
        }

        #canvas-panel {
            width: 680px;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
            background: #dfe6ec;
            padding: 20px;
        }

        #canvas-panel canvas {
            border: 1px solid #22303a;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(16, 24, 32, 0.24);
        }

        #code-panel {
            background: var(--panel);
        }

        #code-panel-header {
            min-height: 44px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        #code-display {
            background: var(--code-bg);
            padding: 18px;
        }

        #code-display code {
            color: var(--code-text);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 13px;
            line-height: 1.58;
        }

        .hljs {
            background: transparent;
            color: var(--code-text);
            padding: 0;
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <div id="sidebar-header">Rapid</div>
        <div id="example-list"></div>
    </div>

    <div id="main-content">
        <div id="topbar">
            <span id="info">—</span>
            <div id="top-links">
                <a href="../docs/">Home</a>
                <a href="../docs/?doc=quick-start">Docs</a>
                <a href="../api-reference/">API</a>
            </div>
        </div>
        <div id="content-area">
            <div id="canvas-panel">
                <canvas id="canvas" width="640" height="480"></canvas>
            </div>
            <div id="code-panel">
                <div id="code-panel-header">Source Code</div>
                <div id="code-display">
                    <code>// Select an example to view code.</code>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
